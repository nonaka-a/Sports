<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <title>3D Badminton Game</title>
    <link rel="stylesheet" href="style.css">
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>

    <!-- 設定メニュー（一時停止） -->
    <div id="settings-menu" style="display: none;">
        <div class="menu-content">
            <h2>PAUSED</h2>
            
            <div class="settings-options">
                <button id="toggle-audio-btn" class="menu-option-btn">音 ON</button>
                <button id="toggle-fullscreen-btn" class="menu-option-btn">全画面</button>
            </div>
            
            <button id="resume-btn" class="menu-btn">再開</button>
            <button id="menu-back-to-title" class="menu-btn danger">タイトルへ戻る</button>
        </div>
    </div>

    <!-- スタート画面 -->
    <div id="start-screen">
        <h1>3D BADMINTON</h1>
        
        <!-- 初期：試合をするボタン -->
        <div id="title-main-zone">
            <button id="play-game-btn" class="start-btn" style="background: linear-gradient(to bottom, #ff9500 0%, #e68500 100%); border-bottom: 6px solid #b36700; box-shadow: 0 6px 0 #8c5000, 0 10px 18px rgba(0, 0, 0, 0.4); text-shadow: 1px 2px 0px #9e5b00; width: 240px;">試合をする</button>
        </div>

        <!-- 設定パネル（初期非表示） -->
        <div id="game-setup-zone" style="display: none; flex-direction: column; align-items: center; gap: 20px; background: rgba(0,0,0,0.6); padding: 25px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.15);">
            
            <div class="setup-group">
                <div class="setup-label">COURT</div>
                <div class="court-select-container" style="display: flex; gap: 12px;">
                    <button class="setup-opt-btn court-opt active" data-court="gym">NORMAL</button>
                    <button class="setup-opt-btn court-opt" data-court="cute">CUTE</button>
                </div>
            </div>

            <div class="setup-group">
                <div class="setup-label">NPC LEVEL</div>
                <div class="level-select-container">
                    <button class="setup-opt-btn level-opt active" data-level="1">LEVEL 1</button>
                    <button class="setup-opt-btn level-opt" data-level="2">LEVEL 2</button>
                    <button class="setup-opt-btn level-opt" data-level="3">LEVEL 3</button>
                    <button class="setup-opt-btn level-opt" data-level="4">LEVEL MAX</button>
                </div>
            </div>

            <div class="setup-group">
                <div class="setup-label">MATCH POINT</div>
                <div class="point-select-container">
                    <button class="setup-opt-btn point-opt" data-point="10">10 PTS</button>
                    <button class="setup-opt-btn point-opt active" data-point="21">21 PTS</button>
                </div>
            </div>

            <button id="final-start-btn" class="start-btn" style="background: linear-gradient(to bottom, #4cd964 0%, #34c759 100%); border-bottom: 6px solid #248a3d; box-shadow: 0 6px 0 #1b662d, 0 10px 18px rgba(0, 0, 0, 0.4); text-shadow: 1px 2px 0px #1e6c31; margin-top: 10px; width: 200px;">START</button>
        </div>
    </div>

    <!-- リザルト画面 -->
    <div id="result-screen" style="display: none;">
        <div class="result-content">
            <h2 id="result-title">YOU WIN!</h2>
            <div id="result-score">21 - 15</div>
            <button id="result-back-to-title" class="menu-btn">タイトルへ戻る</button>
        </div>
    </div>

    <!-- プレイ中UI -->
    <div id="ui-layer" style="display: none;">
        <!-- 設定ボタンを ui-layer 内に配置 -->
        <div id="settings-btn">
            <img src="images/haguruma.png" alt="Settings">
        </div>
        
        <div id="scoreboard">
            <div class="score-box" id="player-score-box">
                <div class="score-label">PLAYER</div>
                <div class="score-value" id="player-score">0</div>
            </div>
            <div class="score-box" id="npc-score-box">
                <div class="score-label">NPC</div>
                <div class="score-value" id="npc-score">0</div>
            </div>
        </div>
        <div id="message-banner">POINT FOR YOU</div>
        <div id="controls-container">
            <div id="dpad-zone">
                <div class="dpad-btn" id="dpad-up">
                    <svg viewBox="0 0 24 24"><path d="M12 4l-8 8h16z" fill="#444444"/></svg>
                </div>
                <div class="dpad-btn" id="dpad-left">
                    <svg viewBox="0 0 24 24"><path d="M4 12l8 8v-16z" fill="#444444"/></svg>
                </div>
                <div class="dpad-btn" id="dpad-right">
                    <svg viewBox="0 0 24 24"><path d="M20 12l-8-8v16z" fill="#444444"/></svg>
                </div>
                <div class="dpad-btn" id="dpad-down">
                    <svg viewBox="0 0 24 24"><path d="M12 20l8-8h-16z" fill="#444444"/></svg>
                </div>
            </div>
            <div id="action-zone">
                <div id="power-meter"><div id="power-fill"></div></div>
                <div id="hit-button"></div>
            </div>
        </div>
    </div>

    <script src="audio.js"></script>
    <script src="physics.js"></script>
    <script src="environment.js"></script>
    <script src="player.js"></script>
    <script src="ui.js"></script>
    <script src="game.js"></script>
</body>
</html>
