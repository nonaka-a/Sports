<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <title>3D Badminton Game</title>
    <link rel="stylesheet" href="style.css">
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>

    <!-- 設定メニュー（一時停止） -->
    <div id="settings-menu" style="display: none;">
        <div class="menu-content">
            <h2>PAUSED</h2>
            
            <div class="settings-options">
                <button id="toggle-audio-btn" class="menu-option-btn">音 ON</button>
                <button id="toggle-fullscreen-btn" class="menu-option-btn">全画面</button>
            </div>
            
            <button id="resume-btn" class="menu-btn">再開</button>
            <button id="menu-back-to-title" class="menu-btn danger">タイトルへ戻る</button>
        </div>
    </div>

    <!-- スタート画面 -->
    <div id="start-screen">
        <h1>3D BADMINTON</h1>
        <div class="level-select">
            <button class="start-btn" data-level="1">LEVEL 1 (EASY)</button>
            <button class="start-btn" data-level="2">LEVEL 2 (HARD)</button>
        </div>
    </div>

    <!-- リザルト画面 -->
    <div id="result-screen" style="display: none;">
        <div class="result-content">
            <h2 id="result-title">YOU WIN!</h2>
            <div id="result-score">21 - 15</div>
            <button id="result-back-to-title" class="menu-btn">タイトルへ戻る</button>
        </div>
    </div>

    <!-- プレイ中UI -->
    <div id="ui-layer" style="display: none;">
        <!-- 設定ボタンを ui-layer 内に配置 -->
        <div id="settings-btn">
            <img src="images/haguruma.png" alt="Settings">
        </div>
        
        <div id="scoreboard">
            <div class="score-box" id="player-score-box">
                <div class="score-label">PLAYER</div>
                <div class="score-value" id="player-score">0</div>
            </div>
            <div class="score-box" id="npc-score-box">
                <div class="score-label">NPC</div>
                <div class="score-value" id="npc-score">0</div>
            </div>
        </div>
        <div id="message-banner">POINT FOR YOU</div>
        <div id="controls-container">
            <div id="dpad-zone">
                <div class="dpad-btn" id="dpad-up">
                    <svg viewBox="0 0 24 24"><path d="M12 4l-8 8h16z" fill="#444444"/></svg>
                </div>
                <div class="dpad-btn" id="dpad-left">
                    <svg viewBox="0 0 24 24"><path d="M4 12l8 8v-16z" fill="#444444"/></svg>
                </div>
                <div class="dpad-btn" id="dpad-right">
                    <svg viewBox="0 0 24 24"><path d="M20 12l-8-8v16z" fill="#444444"/></svg>
                </div>
                <div class="dpad-btn" id="dpad-down">
                    <svg viewBox="0 0 24 24"><path d="M12 20l8-8h-16z" fill="#444444"/></svg>
                </div>
            </div>
            <div id="action-zone">
                <div id="power-meter"><div id="power-fill"></div></div>
                <div id="hit-button"></div>
            </div>
        </div>
    </div>

    <script src="audio.js"></script>
    <script src="physics.js"></script>
    <script src="player.js"></script>
    <script src="ui.js"></script>
    <script src="game.js"></script>
</body>
</html>
